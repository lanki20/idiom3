<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>成語運用複習測驗</title>
  
  <!-- 引入 Tailwind CSS 樣式 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 核心 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel 來在瀏覽器端編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <!-- React 應用程式的掛載點 -->
  <div id="root"></div>

  <!-- 主要程式碼 (Type 必須是 text/babel) -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // === 自訂圖示元件 (取代原本的 lucide-react，讓網頁不須額外安裝套件即可顯示圖示) ===
    const CheckCircle = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
    const XCircle = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>;
    const RefreshCw = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>;
    const MousePointerClick = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 4.1 12 6"/><path d="m5.1 8-2.9-.8"/><path d="m6 12-1.9 2"/><path d="M7.2 2.2 8 5.1"/><path d="M9.037 9.69a.498.498 0 0 1 .653-.653l11 4.5a.5.5 0 0 1-.074.949l-4.349 1.041a1 1 0 0 0-.74.739l-1.04 4.35a.5.5 0 0 1-.95.074z"/></svg>;
    const ArrowRight = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>;
    const Clock = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
    const AlertCircle = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
    const Info = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>;
    const Trophy = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>;

    // === 新版動態題庫設定 ===
    const ALL_IDIOMS = [
      "莫逆之交", "狼狽不堪", "前車之鑑", "水到渠成", "遺珠之憾",
      "才疏學淺", "迥然不同", "劍拔弩張", "如獲至寶", "義不容辭",
      "獨具匠心", "穩扎穩打", "率由舊章", "搖旗吶喊", "牽腸掛肚"
    ];

    // 成語提示
    const idiomHints = {
      "莫逆之交": "心意相投、至好無嫌的朋友。",
      "狼狽不堪": "比喻處境非常窘迫、進退兩難。",
      "前車之鑑": "比喻先前的失敗，可以做為以後的教訓。",
      "水到渠成": "比喻條件成熟，事情自然成功。",
      "遺珠之憾": "比喻人才被埋沒或優美的東西被遺漏。",
      "才疏學淺": "才識不廣，學問不深。多用作自謙之詞。",
      "迥然不同": "完全不同，相差得很遠。",
      "劍拔弩張": "形容情勢緊張，一觸即發。",
      "如獲至寶": "好像得到最珍貴的寶物。比喻非常高興。",
      "義不容辭": "道義上不容許推辭。",
      "獨具匠心": "具有獨創性的巧妙構思。",
      "穩扎穩打": "形容步步為營，踏實穩健地做事。",
      "率由舊章": "完全依循舊有的法規或成例辦事。",
      "搖旗吶喊": "比喻為別人助威壯聲勢。",
      "牽腸掛肚": "比喻十分操心、掛念。"
    };

    // 每句成語對應多個不同題幹 (每次載入會隨機抽一句)
    const questionPool = {
      "莫逆之交": [
        { text: "他們兩人從小一起長大，感情深厚，是真正的", after: "。" },
        { text: "我們因為有共同的愛好而結識，不久便成了", after: "，無話不談。" }
      ],
      "狼狽不堪": [
        { text: "突然下起傾盆大雨，沒帶傘的他被淋得", after: "。" },
        { text: "公司的財務危機讓他陷入", after: "的境地，不知如何是好。" }
      ],
      "前車之鑑": [
        { text: "有了上次投資失敗的", after: "，他這次顯得格外謹慎。" },
        { text: "歷史的教訓應該作為我們的", after: "，避免重蹈覆轍。" }
      ],
      "水到渠成": [
        { text: "只要事前準備充分，這件計畫自然會", after: "，不用太過擔心。" },
        { text: "他們交往多年，感情穩定，結婚也是", after: "的事。" }
      ],
      "遺珠之憾": [
        { text: "這部優秀的電影沒能獲得影展的大獎，實在是", after: "。" },
        { text: "評審們決定增設特別獎，以彌補優秀參賽者落榜的", after: "。" }
      ],
      "才疏學淺": [
        { text: "小弟", after: "，對於這門深奧的學問，實在不敢隨便發表意見。" },
        { text: "雖然他總謙稱自己", after: "，但其實他的見解往往十分精闢。" }
      ],
      "迥然不同": [
        { text: "這對雙胞胎雖然長得很像，但個性卻", after: "。" },
        { text: "南北兩地的飲食文化", after: "，各有其獨特的風味。" }
      ],
      "劍拔弩張": [
        { text: "會議上雙方意見分歧，氣氛", after: "，彷彿隨時會吵起來。" },
        { text: "兩國邊界衝突不斷，局勢", after: "，引起國際社會高度關注。" }
      ],
      "如獲至寶": [
        { text: "他在二手書店找到了絕版的參考書，高興得", after: "。" },
        { text: "拿到偶像親筆簽名的專輯，他簡直", after: "，小心翼翼地收藏起來。" }
      ],
      "義不容辭": [
        { text: "身為社區主委，維護環境整潔是我", after: "的責任。" },
        { text: "老朋友遇到困難，他當然", after: "地伸出援手。" }
      ],
      "獨具匠心": [
        { text: "這座建築物的設計", after: "，巧妙地融合了現代與傳統的元素。" },
        { text: "這位藝術家的木雕作品", after: "，每一個細節都令人嘆為觀止。" }
      ],
      "穩扎穩打": [
        { text: "比賽中我們不求快，只要", after: "，一定能取得最後的勝利。" },
        { text: "這家企業在市場上", after: "，逐漸累積了雄厚的實力。" }
      ],
      "率由舊章": [
        { text: "如果凡事只會", after: "，不思變通，企業將很難適應瞬息萬變的市場。" },
        { text: "新主管上任後，沒有", after: "，反而大刀闊斧地推動了一系列改革。" }
      ],
      "搖旗吶喊": [
        { text: "運動會上，啦啦隊在場邊為選手們", after: "，氣氛十分熱烈。" },
        { text: "他雖然沒有參與實際的企劃，卻很會在旁邊", after: "。" }
      ],
      "牽腸掛肚": [
        { text: "孩子出國留學，做母親的總是對他", after: "，日夜期盼他平安歸來。" },
        { text: "這件案子還沒結案，讓他日夜", after: "，連飯都吃不下。" }
      ]
    };

    const shuffleArray = (array) => {
      const newArr = [...array];
      for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
      }
      return newArr;
    };

    const formatTime = (seconds) => {
      const m = Math.floor(seconds / 60).toString().padStart(2, '0');
      const s = (seconds % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    };

    function App() {
      const [currentQuestions, setCurrentQuestions] = useState([]);
      const [shuffledIdioms, setShuffledIdioms] = useState([]);
      const [answers, setAnswers] = useState([]);
      const [activeBlank, setActiveBlank] = useState(0);
      
      const [gameState, setGameState] = useState('playing'); 
      const [errorMsg, setErrorMsg] = useState('');
      const [wrongIndices, setWrongIndices] = useState([]);
      
      const [timeElapsed, setTimeElapsed] = useState(0);
      const [timerActive, setTimerActive] = useState(false);

      const initGame = () => {
        // 隨機挑選 12 個成語作為這次的題目 (確保每次載入不同，符合最多15題需求且維持良好的版面)
        const QUESTION_COUNT = 12;
        const shuffledAll = shuffleArray(ALL_IDIOMS);
        const selectedIdioms = shuffledAll.slice(0, QUESTION_COUNT);
        
        // 從題庫中為每個成語隨機挑一個題幹
        const generatedQuestions = selectedIdioms.map((idiom, index) => {
          const pool = questionPool[idiom];
          const randomQ = pool[Math.floor(Math.random() * pool.length)];
          return {
            id: index + 1,
            text: randomQ.text,
            blank: idiom,
            after: randomQ.after
          };
        });

        // 再次打亂題目出現的順序
        setCurrentQuestions(shuffleArray(generatedQuestions));
        setShuffledIdioms(shuffleArray(selectedIdioms));
        setAnswers(Array(QUESTION_COUNT).fill(null));
        setActiveBlank(0);
        setGameState('playing');
        setErrorMsg('');
        setWrongIndices([]);
        setTimeElapsed(0);
        setTimerActive(true);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      useEffect(() => {
        initGame();
      }, []);

      useEffect(() => {
        let interval;
        if (timerActive) {
          interval = setInterval(() => {
            setTimeElapsed(prev => prev + 1);
          }, 1000);
        }
        return () => clearInterval(interval);
      }, [timerActive]);

      const handleSelectIdiom = (idiom) => {
        if (gameState !== 'playing' || activeBlank === null) return;
        setErrorMsg('');

        const newAnswers = [...answers];
        const existingIndex = newAnswers.indexOf(idiom);
        
        if (existingIndex !== -1) {
          newAnswers[existingIndex] = null;
        }
        
        newAnswers[activeBlank] = idiom;
        setAnswers(newAnswers);

        const nextEmpty = newAnswers.findIndex((ans, idx) => ans === null && idx !== activeBlank);
        setActiveBlank(nextEmpty !== -1 ? nextEmpty : null);
      };

      const handleSlotClick = (index) => {
        if (gameState !== 'playing') return;
        
        if (answers[index] !== null) {
          const newAnswers = [...answers];
          newAnswers[index] = null;
          setAnswers(newAnswers);
        }
        
        setActiveBlank(index);
        setErrorMsg('');
      };

      const handleSubmit = () => {
        if (answers.includes(null)) {
          setErrorMsg("⚠️ 還有空格未填寫完畢喔！請全部填滿再交卷。");
          return;
        }
        
        let wIndices = [];
        answers.forEach((ans, idx) => {
          if (ans !== currentQuestions[idx].blank) wIndices.push(idx);
        });

        if (wIndices.length === 0) {
          setGameState('won');
          setTimerActive(false);
        } else {
          setWrongIndices(wIndices);
          setGameState('checking');
        }
      };

      const handleRetryErrors = () => {
        const newAnswers = [...answers];
        wrongIndices.forEach(idx => {
          newAnswers[idx] = null;
        });
        setAnswers(newAnswers);
        setGameState('playing');
        setWrongIndices([]);
        setErrorMsg('');
        
        const firstEmpty = newAnswers.findIndex(ans => ans === null);
        setActiveBlank(firstEmpty !== -1 ? firstEmpty : 0);
      };

      // 避免初始未載入題庫時報錯
      if (currentQuestions.length === 0) return <div>載入中...</div>;

      return (
        <div className="min-h-screen bg-slate-50 py-8 px-4 font-sans text-slate-800 pb-[360px] lg:pb-8 relative">
          
          {/* 版本提示標籤 */}
          <div className="absolute top-4 right-4 md:top-6 md:right-6 bg-indigo-100 text-indigo-800 px-3 py-1.5 rounded-full text-xs md:text-sm font-bold shadow-sm border border-indigo-200 z-50 flex items-center gap-1.5 opacity-90 hover:opacity-100 transition-opacity">
            <Info className="w-4 h-4" /> 五下段二甲
          </div>

          {gameState === 'won' && (
            <div className="fixed inset-0 pointer-events-none z-0 flex justify-center overflow-hidden">
              {Array.from({ length: 50 }).map((_, i) => (
                <div 
                  key={i}
                  className="absolute animate-confetti w-3 h-3 rounded-sm"
                  style={{
                    left: `${Math.random() * 100}%`,
                    top: `-5%`,
                    backgroundColor: ['#f87171', '#fbbf24', '#34d399', '#60a5fa', '#a78bfa', '#f472b6'][Math.floor(Math.random() * 6)],
                    animationDelay: `${Math.random() * 3}s`,
                    animationDuration: `${2 + Math.random() * 3}s`
                  }}
                />
              ))}
              <style>{`
                @keyframes confetti {
                  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
                  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
                }
                .animate-confetti { animation: confetti linear forwards infinite; }
              `}</style>
            </div>
          )}

          <div className="max-w-6xl mx-auto space-y-6 relative z-10">
            
            <header className="text-center mb-8">
              <h1 className="text-3xl md:text-4xl font-bold text-indigo-800 mb-4 drop-shadow-sm flex items-center justify-center gap-3">
                📖 挑戰：成語填空大考驗
              </h1>
              <div className="flex flex-wrap justify-center items-center gap-4 text-slate-600 text-base md:text-lg">
                <span className="flex items-center gap-2 bg-white px-4 py-1.5 rounded-full shadow-sm border border-slate-200">
                  <MousePointerClick className="w-5 h-5 text-indigo-500" />
                  點擊空格後選擇下方成語
                </span>
                <span className={`flex items-center gap-2 bg-white px-4 py-1.5 rounded-full shadow-sm border border-slate-200 font-mono font-bold ${gameState === 'won' ? 'text-green-600' : 'text-slate-700'}`}>
                  <Clock className={`w-5 h-5 ${gameState === 'won' ? 'text-green-500' : 'text-slate-400'}`} />
                  {formatTime(timeElapsed)}
                </span>
              </div>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 lg:gap-8">
              
              <div className="lg:col-span-8 space-y-4 md:space-y-5">
                {currentQuestions.map((q, idx) => {
                  const isFilled = answers[idx] !== null;
                  const isActive = activeBlank === idx && gameState === 'playing';
                  const isWrong = gameState === 'checking' && wrongIndices.includes(idx);
                  const isCorrectInChecking = gameState === 'checking' && !wrongIndices.includes(idx);
                  const isAllWon = gameState === 'won';

                  return (
                    <div 
                      key={q.id} 
                      className={`bg-white p-5 md:p-6 rounded-2xl shadow-sm border-2 transition-all duration-300 flex flex-col gap-3
                        ${isActive ? 'border-indigo-400 shadow-md ring-4 ring-indigo-50' : 'border-transparent hover:border-slate-200'}
                        ${isWrong ? 'border-red-300 bg-red-50' : ''}
                        ${isAllWon ? 'border-green-300 bg-green-50' : ''}
                      `}
                    >
                      <div className="flex items-start gap-4">
                        <span className={`flex-shrink-0 w-8 h-8 flex items-center justify-center font-bold rounded-full text-sm
                          ${isWrong ? 'bg-red-200 text-red-800' : isAllWon ? 'bg-green-200 text-green-800' : 'bg-indigo-100 text-indigo-700'}
                        `}>
                          {idx + 1}
                        </span>
                        <div className="text-lg leading-loose text-slate-700 flex-1 flex flex-wrap items-center">
                          <span>{q.text}</span>
                          
                          <div 
                            onClick={() => handleSlotClick(idx)}
                            className={`
                              mx-2 px-4 py-1 min-w-[120px] h-10 inline-flex items-center justify-center rounded-lg font-medium transition-all duration-200
                              ${gameState === 'playing' ? 'cursor-pointer hover:scale-105 active:scale-95' : 'cursor-default'}
                              ${!isFilled && !isActive ? 'border-b-2 border-dashed border-slate-400 text-slate-400 bg-slate-50 hover:bg-slate-100' : ''}
                              ${isActive ? 'bg-indigo-500 text-white shadow-inner' : ''}
                              ${isFilled && !isActive && gameState === 'playing' ? 'bg-indigo-100 text-indigo-800 border border-indigo-200' : ''}
                              ${isWrong ? 'bg-red-500 text-white shadow-inner line-through decoration-2 opacity-80' : ''}
                              ${isCorrectInChecking || isAllWon ? 'bg-green-500 text-white border border-green-600' : ''}
                            `}
                          >
                            {answers[idx] || (isActive ? '請選擇成語' : '＿＿＿＿')}
                          </div>

                          <span>{q.after}</span>
                        </div>
                      </div>

                      {isWrong && (
                        <div className="ml-12 mt-2 p-3 bg-white rounded-lg border border-red-200 flex items-start gap-2 text-red-700 animate-[pulse_1s_ease-in-out] shadow-sm">
                          <Info className="w-5 h-5 flex-shrink-0 mt-0.5" />
                          <div>
                            <p className="font-bold text-sm mb-1">提示：正確的成語意思是...</p>
                            <p className="text-sm">{idiomHints[q.blank]}</p>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>

              <div className="lg:col-span-4">
                <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 p-4 shadow-[0_-15px_30px_-15px_rgba(0,0,0,0.2)] z-50 
                                lg:sticky lg:top-8 lg:border lg:rounded-3xl lg:p-6 lg:shadow-xl lg:bg-white lg:flex lg:flex-col">
                  
                  {gameState === 'won' ? (
                    <div className="text-center py-6 space-y-5">
                      <div className="w-20 h-20 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-4 animate-bounce">
                        <Trophy className="w-10 h-10 text-yellow-500" />
                      </div>
                      <h2 className="text-2xl font-black text-green-600">恭喜全部答對！</h2>
                      <p className="text-slate-600 font-medium">
                        闖關總耗時：<span className="text-xl text-indigo-600 font-bold">{formatTime(timeElapsed)}</span>
                      </p>
                      <button 
                        onClick={initGame}
                        className="w-full mt-4 py-4 bg-indigo-600 text-white text-lg font-bold rounded-xl shadow-lg hover:bg-indigo-700 hover:-translate-y-1 transition-all flex justify-center items-center gap-2"
                      >
                        <RefreshCw className="w-5 h-5" /> 玩新的一局
                      </button>
                    </div>
                  ) : (
                    <>
                      <div className="flex justify-between items-center mb-3 lg:mb-5">
                        <h2 className="text-lg lg:text-xl font-bold text-slate-800 flex items-center gap-2">
                          🧩 成語字庫
                        </h2>
                        {gameState === 'playing' && (
                          <span className="text-xs lg:text-sm font-medium text-indigo-600 bg-indigo-50 px-2 lg:px-3 py-1 rounded-full whitespace-nowrap">
                            {activeBlank !== null ? `正在填寫第 ${activeBlank + 1} 題` : '請點擊空格'}
                          </span>
                        )}
                      </div>

                      <div className="grid grid-cols-4 sm:grid-cols-6 lg:grid-cols-2 gap-2 lg:gap-3 overflow-y-auto max-h-[22vh] min-h-[120px] lg:max-h-[50vh] p-1">
                        {shuffledIdioms.map((idiom, idx) => {
                          let isUsed = false;
                          const ansIdx = answers.indexOf(idiom);
                          if (ansIdx !== -1) {
                            if (gameState === 'playing') isUsed = true;
                            else if (gameState === 'checking' && !wrongIndices.includes(ansIdx)) isUsed = true;
                          }

                          const isDisabled = gameState !== 'playing' || activeBlank === null;

                          return (
                            <button
                              key={idx}
                              onClick={() => handleSelectIdiom(idiom)}
                              disabled={isDisabled}
                              className={`
                                py-2 px-1 lg:py-3 lg:px-2 rounded-xl text-center text-sm lg:text-base font-bold transition-all duration-200 border-2
                                ${isUsed && gameState === 'playing'
                                  ? 'bg-slate-50 text-slate-500 border-dashed border-slate-300 hover:border-indigo-400 hover:text-indigo-600 hover:shadow-sm opacity-80' 
                                  : isUsed && gameState !== 'playing'
                                  ? 'bg-slate-100 text-slate-400 border-transparent cursor-not-allowed opacity-50'
                                  : 'bg-white text-slate-700 border-slate-200 hover:border-indigo-400 hover:text-indigo-600 hover:shadow-md active:scale-95 shadow-sm'
                                }
                                ${activeBlank === null && !isUsed && gameState === 'playing' ? 'opacity-70' : ''}
                              `}
                            >
                              {idiom}
                            </button>
                          );
                        })}
                      </div>

                      {errorMsg && (
                        <div className="mt-3 flex items-center gap-2 text-red-600 bg-red-50 p-2 lg:p-3 rounded-lg text-sm font-bold">
                          <AlertCircle className="w-5 h-5 flex-shrink-0" />
                          {errorMsg}
                        </div>
                      )}

                      <div className="mt-4 pt-4 border-t border-slate-100">
                        {gameState === 'playing' ? (
                          <button 
                            onClick={handleSubmit}
                            className="w-full py-3 lg:py-4 bg-indigo-600 text-white text-base lg:text-lg font-bold rounded-xl shadow-lg shadow-indigo-200 hover:bg-indigo-700 active:scale-95 transition-all flex justify-center items-center gap-2"
                          >
                            交卷對答案 <CheckCircle className="w-5 h-5" />
                          </button>
                        ) : (
                          <div className="space-y-3">
                            <div className="p-3 lg:p-4 rounded-xl text-center bg-red-50 border-2 border-red-200 text-red-700">
                              <p className="font-bold mb-1">
                                哎呀！有 <span className="text-xl mx-1">{wrongIndices.length}</span> 題答錯了
                              </p>
                              <p className="text-xs lg:text-sm">請看左側的紅框提示後重新挑戰！</p>
                            </div>
                            <button 
                              onClick={handleRetryErrors}
                              className="w-full py-3 lg:py-4 bg-orange-500 text-white text-base lg:text-lg font-bold rounded-xl shadow-md hover:bg-orange-600 active:scale-95 transition-all flex justify-center items-center gap-2"
                            >
                              <RefreshCw className="w-5 h-5" /> 重新作答錯誤題目
                            </button>
                          </div>
                        )}
                      </div>
                    </>
                  )}

                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    // 將 App 渲染到網頁上
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
